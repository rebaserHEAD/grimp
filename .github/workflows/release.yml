name: Release

# Push a version tag (e.g. v1.0.0) to build Windows + Linux artifacts and
# assemble them into a draft GitHub Release. workflow_dispatch builds the
# same artifacts without publishing, for testing the pipeline off a tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: windows
          - os: ubuntu-latest
            platform: linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Platform-agnostic SPA build (base './' for the packaged app://).
      - name: Build web app
        run: npm run build:electron

      # Package for this runner's OS. --publish never keeps electron-builder
      # from touching GitHub; the release job below does the publishing.
      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    # Only cut a release for tag pushes, not manual test runs.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
