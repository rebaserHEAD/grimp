appId: com.rebaserhead.ss14mapeditor
productName: SS14 Map Editor
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - package.json
# NOTE: no electronDist here. CI runners let electron-builder download
# Electron normally. The local npm scripts pass --config.electronDist to
# reuse the installed dist, which sidesteps a Windows Defender EPERM on the
# staging-dir rename; that path only exists on a machine that ran the
# electron postinstall, so it must not be baked into the shared config.
win:
  target: portable
  icon: build/icon.ico
# No code signing configured; the portable exe is unsigned.
linux:
  target: AppImage
  icon: build/icon.png
  category: Development
  maintainer: rebaserHEAD
